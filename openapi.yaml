              - 'Converting web pages to JSON format'
              - 'Collecting page metadata, links, and contact information'
            when_not_to_use:
              - 'Bypassing authentication or paywalls (not supported by code)'
              - 'High-frequency scraping (no rate limiting visible)'
              - 'Multi-page crawling (single URL per request based on examples)'
              - 'Visual or image content analysis (text-based only)'
          input_structure: 'Accepts natural language text containing a URL. Example: "Extract information from https://www.example.com". The agent extracts the URL from the message and processes it. No structured JSON input parameters are enforced by the code.'
          output_format: 'Returns JSON matching PageInformation Pydantic schema with url, title, description, features, content_sections, links, contact_info, and metadata. Agent instructions specify markdown=False and structured_outputs=True. Output is wrapped in JSON code block in response.'
          error_handling:
            - 'APIKeyError raised if OPENROUTER_API_KEY or EXA_API_KEY missing'
            - 'RuntimeError if agent not initialized'
            - 'Tool initialization failures logged but may continue without optional tools'
            - 'No explicit retry logic in code'
            - 'No explicit timeout handling in code'
          examples:
            - title: 'Wikipedia Page Extraction'
              input:
                text: 'Extract information from https://en.wikipedia.org/wiki/Python_(programming_language)'
              output:
                url: 'https://en.wikipedia.org/wiki/Python_(programming_language)'
                title: 'Python (programming language)'
            - title: 'Company Website Extraction'
              input:
                text: 'Extract information from https://www.mozilla.org/en-US/'
              output:
                url: 'https://www.mozilla.org/'
                title: 'Welcome to Mozilla'
                description: 'Mozilla - Internet for people, not profit (US)'
          best_practices:
            for_developers:
              - 'Set OPENROUTER_API_KEY and EXA_API_KEY environment variables'
              - 'Optionally set FIRECRAWL_API_KEY for advanced scraping'
              - 'Optionally set MEM0_API_KEY for conversation memory'
              - 'Use MODEL_NAME to specify OpenRouter model (default: openai/gpt-4o)'
              - 'Set ENABLE_FIRECRAWL=false to disable Firecrawl if needed'
            for_orchestrators:
              - 'Send messages to http://127.0.0.1:3773 using JSON-RPC 2.0'
              - 'Use message/send method with skillId: web-extraction-v1'
              - 'Poll tasks/get to retrieve completed results'
              - 'Expect JSON output in artifacts with name result'
              - 'Agent initializes lazily on first request'
          installation: 'Install dependencies: uv sync. Set environment variables: OPENROUTER_API_KEY (required), EXA_API_KEY (required), FIRECRAWL_API_KEY (optional), MEM0_API_KEY (optional), MODEL_NAME (optional, default: openai/gpt-4o), ENABLE_FIRECRAWL (optional, default: true). Run: python -m web_extraction_agent.main. Server starts on http://127.0.0.1:3773'
          versioning:
            - version: '1.0.0'
              date: '2026-01-12'
              changes: 'Initial implementation with Exa, Firecrawl, OpenRouter, and Mem0 integration'
        assessment:
          keywords:
            - 'extract information from'
            - 'web extraction'
            - 'scrape website'
            - 'extract content'
            - 'get information from url'
            - 'extract from https'
          specializations:
