          type: integer
          minimum: 1
          maximum: 5
        metadata:
          type: object
    TasksFeedbackResult:
      type: object
      properties:
        success:
          type: boolean
    # ContextsList
    ContextsListParams:
      type: object
      properties:
        length:
          type: integer
          minimum: 1
          maximum: 100
    ContextsListResult:
      type: array
      items:
        type: object
        description: Conversation context object
    # ContextsClear
    ContextsClearParams:
      type: object
      required:
        - contextId
      properties:
        contextId:
          type: string
          format: uuid
    ContextsClearResult:
      type: object
      properties:
        success:
          type: boolean

