          - 'FirecrawlTools (scrape, crawl) - optional'
          - 'Mem0Tools (memory operations) - optional'
        documentation:
          overview: 'Agent built on Agno framework that fetches web content via Exa API (required) and optionally Firecrawl API, then uses OpenRouter LLM to structure the content into a PageInformation JSON schema. The agent uses lazy initialization and runs on port 3773 by default. Mem0 can be enabled for conversation memory if API key is provided.'
